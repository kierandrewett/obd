name: Fetch DTC Codes

on:
  schedule:
    - cron: "0 3 1 * *"   # monthly, 1st of the month 03:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    name: Fetch & commit DTC codes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: scripts/yarn.lock

      - name: Install dependencies
        working-directory: scripts
        run: yarn install --frozen-lockfile

      - name: Install Chromium
        run: npx puppeteer browsers install chrome
        working-directory: scripts

      - name: Fetch DTC codes
        working-directory: scripts
        run: node fetch_dtc_codes.js --concurrency 50

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dtc_codes/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update DTC codes [skip ci]"
          git push
